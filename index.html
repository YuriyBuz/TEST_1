<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">

    <title>Тест: Паспорт Якості (FSSC 22000 v6)</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --primary: #059669;
            --danger: #dc2626;
        }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; padding-bottom: 2rem; }
        .card { background-color: var(--card-bg); border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        
        .option-btn { transition: all 0.2s; border: 2px solid #e2e8f0; position: relative; }
        .option-btn:not(.disabled):hover { border-color: var(--primary); background-color: #f0fdf4; }
        
        .option-btn.correct-choice { border-color: var(--primary) !important; background-color: #ecfdf5 !important; }
        .option-btn.wrong-choice { border-color: var(--danger) !important; background-color: #fef2f2 !important; }
        .option-btn.disabled { cursor: default; opacity: 0.7; }

        .feedback-box { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .hidden { display: none !important; }
        .spinner { animation: rotate 2s linear infinite; width: 16px; height: 16px; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

            <div class="card p-6 rounded-2xl min-h-[420px] flex flex-col justify-between">

                    <div id="options-container" class="space-y-3"></div>
                    
                    <!-- Explanation Block -->
                    <div id="feedback-container" class="hidden mt-6 feedback-box">
                        <div id="feedback-type" class="p-4 rounded-xl border-l-4">

                                <span id="feedback-title" class="font-bold"></span>
                            </div>
                            <p id="feedback-text" class="text-sm italic"></p>
                        </div>
                    </div>
                </div>
                
                <button id="next-btn" onclick="nextQuestion()" disabled class="mt-8 w-full bg-gray-300 text-gray-500 font-bold py-4 rounded-xl cursor-not-allowed transition">
                    Далі
                </button>
            </div>
        </div>

        <!-- Step 3: Results -->
        <div id="step-result" class="hidden text-center">
            <div class="card p-8 rounded-3xl">
                <div id="sync-indicator" class="mb-4 text-[10px] font-black uppercase tracking-tighter text-amber-500 flex items-center justify-center gap-2">

                    <div class="spinner border-2 border-amber-500 border-t-transparent rounded-full"></div>
                </div>

                <div id="icon-result" class="text-6xl mb-4"></div>
                <h2 id="title-result" class="text-3xl font-bold mb-1"></h2>

                </div>

                </div>

                <button onclick="location.reload()" class="w-full py-4 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold rounded-xl transition">
                    Пройти ще раз
                </button>
            </div>
        </div>

    </div>

            {
                q: "Інфраструктура: Стеля почала лущитися над котлом. Ваші дії?",
                a: ["Накрити котел, повідомити майстра", "Продовжити роботу", "Прибрати шматки ложкою"],
                correct: 0,
                hint: "Фарба є джерелом фізичного та хімічного забруднення."
            }
        ];

        let currentQIndex = 0;
        let score = 0;
        let userName = "";
        let selectedOptionIndex = null;
        let testLog = []; 

        document.addEventListener('DOMContentLoaded', () => {
            const select = document.getElementById('employeeSelect');
            employeesList.sort().forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                select.appendChild(opt);
            });
            updateNetworkStatus();
            window.addEventListener('online', () => { updateNetworkStatus(); processOfflineQueue(); });
            window.addEventListener('offline', updateNetworkStatus);
        });

        function startTest() {
            userName = document.getElementById('employeeSelect').value;
            if (!userName) { alert("Будь ласка, оберіть ПІБ"); return; }
            document.getElementById('step-login').classList.add('hidden');
            document.getElementById('step-quiz').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = questions[currentQIndex];
            document.getElementById('q-current').innerText = currentQIndex + 1;
            document.getElementById('progress-bar').style.width = `${((currentQIndex) / questions.length) * 100}%`;
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('feedback-container').classList.add('hidden');
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            const nextBtn = document.getElementById('next-btn');
            nextBtn.disabled = true;
            nextBtn.className = "mt-8 w-full bg-gray-300 text-gray-500 font-bold py-4 rounded-xl cursor-not-allowed transition";
            nextBtn.innerText = currentQIndex === questions.length - 1 ? "Завершити тест" : "Наступне питання";

            q.a.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn w-full text-left p-4 rounded-xl text-lg flex items-center mb-1';
                btn.innerHTML = `<span class="w-8 h-8 rounded-full border-2 border-slate-200 flex items-center justify-center mr-3 text-xs font-bold text-slate-400">${String.fromCharCode(65 + index)}</span> ${opt}`;
                btn.onclick = () => showFeedback(index, btn);
                container.appendChild(btn);
            });
        }

        function showFeedback(index, btn) {
            if (selectedOptionIndex !== null) return; 
            
            selectedOptionIndex = index;
            const q = questions[currentQIndex];
            const isCorrect = (index === q.correct);
            
            if (isCorrect) {
                score++;
                btn.classList.add('correct-choice');
                testLog.push(`✅`);
                displayFeedbackBox(true, q.hint);
            } else {
                btn.classList.add('wrong-choice');
                testLog.push(`❌`);
                const allBtns = document.querySelectorAll('.option-btn');
                allBtns[q.correct].classList.add('correct-choice');
                displayFeedbackBox(false, q.hint);
            }

            document.querySelectorAll('.option-btn').forEach(b => b.classList.add('disabled'));
            
            const nextBtn = document.getElementById('next-btn');
            nextBtn.disabled = false;
            nextBtn.className = "mt-8 w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-lg transition";
        }

        function displayFeedbackBox(isCorrect, hint) {
            const box = document.getElementById('feedback-container');
            const type = document.getElementById('feedback-type');
            const icon = document.getElementById('feedback-icon');
            const title = document.getElementById('feedback-title');
            const text = document.getElementById('feedback-text');

            box.classList.remove('hidden');
            text.innerText = hint;

            if (isCorrect) {
                type.className = "p-4 rounded-xl border-l-4 border-emerald-500 bg-emerald-50 text-emerald-800";
                icon.innerHTML = "✅";
                title.innerText = "Правильно!";
            } else {
                type.className = "p-4 rounded-xl border-l-4 border-red-500 bg-red-50 text-red-800";
                icon.innerHTML = "❌";
                title.innerText = "Не зовсім...";
            }
        }

        function nextQuestion() {
            selectedOptionIndex = null;
            currentQIndex++;
            if (currentQIndex < questions.length) renderQuestion(); else showResults();
        }

        function showResults() {
            document.getElementById('step-quiz').classList.add('hidden');
            document.getElementById('step-result').classList.remove('hidden');

            const percent = Math.round((score / questions.length) * 100);
            const passed = score >= 24;

            document.getElementById('score-val').innerText = score;
            document.getElementById('percentage-val').innerText = `${percent}% Успіху`;
            
            const icon = document.getElementById('icon-result');
            const title = document.getElementById('title-result');
            const msg = document.getElementById('msg-result');

            if (passed) {
                icon.innerText = "🏆"; title.innerText = "СКЛАДЕНО";
                title.className = "text-3xl font-black mb-1 text-emerald-600";
                msg.innerText = "Ви підтвердили високий рівень знань стандартів FSSC 22000. Результати внесено до реєстру.";
            } else {
                icon.innerText = "⚠️"; title.innerText = "НЕ СКЛАДЕНО";
                title.className = "text-3xl font-black mb-1 text-red-600";
                msg.innerText = `Необхідно мінімум 24 бали. У вас ${score}. Будь ласка, перегляньте стандарти якості та спробуйте ще раз.`;
            }

            const payload = { 
                formType: 'fssc_test',
                name: userName, 
                score, 
                total: 26, 
                percent, 
                passed, 
                details: testLog.join(' '), 
                date: new Date().toISOString() 
            };
            sendToGAS(payload);

            const qrText = `FSSC:${userName}|${score}/26|${passed?'OK':'FAIL'}|${testLog.join('')}`;
            const qrContainer = document.getElementById("qrcode");
            qrContainer.innerHTML = "";
            
            try {
                new QRCode(qrContainer, { 
                    text: qrText, 
                    width: 160, 
                    height: 160,
                    correctLevel : QRCode.CorrectLevel.L 
                });
            } catch (e) {
                console.error("QR Error:", e);
                qrContainer.innerText = "Помилка QR";
            }
        }

        function sendToGAS(payload) {
            if (!navigator.onLine) { saveToOffline(payload); return; }

            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(() => {
                document.getElementById('sync-indicator').innerHTML = '<span class="text-emerald-500 font-bold uppercase tracking-widest text-[10px]">✅ Збережено в таблиці</span>';
            }).catch(() => { saveToOffline(payload); });
        }

        function saveToOffline(payload) {
            const queue = JSON.parse(localStorage.getItem(OFFLINE_QUEUE_KEY) || '[]');
            queue.push(payload);
            localStorage.setItem(OFFLINE_QUEUE_KEY, JSON.stringify(queue));
            document.getElementById('sync-indicator').innerHTML = '<span class="text-amber-500 font-bold uppercase tracking-widest text-[10px]">📵 Офлайн (В пам\'яті)</span>';
        }

        async function processOfflineQueue() {
            if (!navigator.onLine) return;
            const queue = JSON.parse(localStorage.getItem(OFFLINE_QUEUE_KEY) || '[]');
            if (queue.length === 0) return;

            for (const payload of [...queue]) {
                try {
                    await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    queue.shift();
                } catch (e) { break; }
            }
            localStorage.setItem(OFFLINE_QUEUE_KEY, JSON.stringify(queue));
            updateNetworkStatus();
        }

        function updateNetworkStatus() {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            const queue = JSON.parse(localStorage.getItem(OFFLINE_QUEUE_KEY) || '[]');
            
            if (!navigator.onLine) {
                dot.className = 'w-2 h-2 rounded-full bg-red-500';
                text.textContent = 'Офлайн';
            } else {
                dot.className = 'w-2 h-2 rounded-full bg-green-500';
                text.textContent = queue.length > 0 ? `Онлайн (Черга: ${queue.length})` : 'Онлайн';
            }
        }
    </script>
</body>
</html>
