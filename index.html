<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест: Паспорт Якості (FSSC 22000 v6)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg-color: #f8fafc; --card-bg: #ffffff; --text-main: #1e293b; --primary: #059669; --danger: #dc2626; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; padding-bottom: 2rem; }
        .card { background-color: var(--card-bg); border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .option-btn { transition: all 0.2s; border: 2px solid #e2e8f0; position: relative; }
        .option-btn:not(.disabled):hover { border-color: var(--primary); background-color: #f0fdf4; }
        .option-btn.correct-choice { border-color: var(--primary) !important; background-color: #ecfdf5 !important; }
        .option-btn.wrong-choice { border-color: var(--danger) !important; background-color: #fef2f2 !important; }
        .option-btn.disabled { cursor: default; opacity: 0.7; }
        .feedback-box { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
        .spinner { animation: rotate 2s linear infinite; width: 16px; height: 16px; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="container mx-auto max-w-2xl p-4 sm:p-6">
        <header class="text-center mb-6 pt-4">
            <img src="https://foodline-production.com/wp-content/uploads/2021/10/3752781497_3752781497.webp" alt="Logo" class="w-24 h-auto mx-auto mb-4 rounded-xl shadow-sm bg-white p-1">
            <div class="flex items-center justify-center gap-2 mb-1">
                <div id="statusDot" class="w-2 h-2 rounded-full bg-green-500"></div>
                <span id="statusText" class="text-xs font-bold text-slate-500 uppercase tracking-widest">Онлайн</span>
            </div>
            <h1 class="text-2xl font-bold text-emerald-800">Паспорт Якості</h1>
            <p class="text-slate-500 text-sm">Виробництво соусів | FSSC 22000 v6</p>
        </header>

        <div id="step-login" class="card p-6 rounded-2xl">
            <div class="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6">
                <h3 class="font-bold text-blue-800 text-sm">Інструкція:</h3>
                <p class="text-xs text-blue-700 mt-1">Результати записуються у вкладку <b>Quality_Passport_Results</b>. Прохідний бал: 24/26.</p>
            </div>
            <label class="block text-sm font-bold mb-2 text-slate-700">Оберіть ПІБ:</label>
            <select id="employeeSelect" class="w-full p-3 border border-gray-300 rounded-xl bg-white text-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 mb-6"><option value="">-- Натисніть для вибору --</option></select>
            <button onclick="startTest()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-lg transition transform active:scale-95">РОЗПОЧАТИ ТЕСТ</button>
        </div>

        <div id="step-quiz" class="hidden">
            <div class="flex justify-between items-center mb-4 px-2">
                <span class="text-xs font-bold text-slate-400 uppercase">Питання <span id="q-current">1</span> / <span id="q-total-counter">0</span></span>
                <div class="w-1/2 bg-gray-200 rounded-full h-2"><div id="progress-bar" class="bg-emerald-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div></div>
            </div>
            <div class="card p-6 rounded-2xl min-h-[420px] flex flex-col justify-between">
                <div>
                    <h2 id="question-text" class="text-xl font-bold mb-6 text-slate-800 leading-tight"></h2>
                    <div id="options-container" class="space-y-3"></div>
                    <div id="feedback-container" class="hidden mt-6 feedback-box">
                        <div id="feedback-type" class="p-4 rounded-xl border-l-4">
                            <div class="flex items-center mb-1"><span id="feedback-icon" class="mr-2"></span><span id="feedback-title" class="font-bold"></span></div>
                            <p id="feedback-text" class="text-sm italic"></p>
                        </div>
                    </div>
                </div>
                <button id="next-btn" onclick="nextQuestion()" disabled class="mt-8 w-full bg-gray-300 text-gray-500 font-bold py-4 rounded-xl cursor-not-allowed transition">Наступне питання</button>
            </div>
        </div>

        <div id="step-result" class="hidden text-center">
            <div class="card p-8 rounded-3xl">
                <div id="sync-indicator" class="mb-4 text-[10px] font-black uppercase tracking-tighter text-amber-500 flex items-center justify-center gap-2"><span>Синхронізація...</span><div class="spinner border-2 border-amber-500 border-t-transparent rounded-full"></div></div>
                <div id="icon-result" class="text-6xl mb-4"></div>
                <h2 id="title-result" class="text-3xl font-bold mb-1"></h2>
                <div class="py-6 my-4 border-y border-slate-100"><p class="text-5xl font-black text-slate-800"><span id="score-val">0</span> / <span id="score-total">0</span></p><p id="percentage-val" class="text-sm font-bold text-emerald-600 mt-2 bg-emerald-50 inline-block px-3 py-1 rounded-full"></p></div>
                <p id="msg-result" class="text-base mb-8 px-4 text-slate-500 leading-relaxed"></p>
                <div class="mb-8 flex justify-center"><div id="qrcode" class="p-2 bg-white border rounded-xl"></div></div>
                <button onclick="location.reload()" class="w-full py-4 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold rounded-xl transition">Повернутися</button>
            </div>
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzkzOkyk2zwObyZThhZE1ACAPYAtwPMZsSoUij9yHw_vEKgmkImUOCVlk-F_SH06b_w/exec';
        const OFFLINE_QUEUE_KEY = 'fssc_quality_offline_queue';
        const employeesList = ["Бойко Світлана Петрівна", "Бондаренко Валерій Валентинович", "Вискірко Руслана Михайлівна", "Воробей Людмила Леонідівна", "Ворона Інна Василівна", "Ворожко Дарья Вячеславівна", "Галагін Євгеній Ярославович", "Гончарук Ольга Михайлівна", "Гора Андрій Олександрович", "Долинюк Олександр Миколайович", "Єрко Віктор Андрійович", "Загура Іван Борисович", "Іванчук Олександр Анатолійович", "Кішка Сергій Володимирович", "Козурак Іван Миколайович", "Козило Василь Вячеславович", "Кораблін Дмитро", "Корнієнко Жанна Василівна", "Король Юрій Валерійович", "Кучера Галина Іванівна", "Лавриненко Максим Миколайович", "Максімюк Анатолій Анатолійович", "Максімюк Анатолій Вікторович", "Марків Олександр Йосипович", "Мозговий Олександр Сергійович", "Непорадна Олена Михайлівна", "Огаркова Марія Володимирівна", "Попадюк Анжела Миколаївна", "Садиріна Ольга Анатоліївна", "Свінцов Михайло Генадійович", "Снітко Ярослав Іванович", "Соботович Лілія Михайлівна", "Соботович Тетяна Михайлівна", "Солдатова Ірина Володимирівна", "Сосновський Валерій Петрович", "Фалько Анатолій Олександрович", "Фисина Наталія Григорівна", "Хакімов Олександр Михайлович", "Хлупянець Віталій Анатолійович", "Христянович Віталій Едуардович", "Черніцький Назарій Вячеславович", "Шанчук Павло Сергійович", "Шута Олександра Сергіївна"];
        const originalQuestions = [
            { q: "Культура безпеки: колега не змінив рукавички після підлоги. Ваші дії?", a: ["Проігнорувати", "Зробити зауваження, покликати майстра", "Змінити за нього"], ci: 1, h: "Культура безпеки — це відповідальність кожного за спільний результат." },
            { q: "ККТ: Температура пастеризації впала нижче 90°C. Дії?", a: ["Збільшити пар", "Зупинити процес, карантин партії", "Записати пізніше"], ci: 1, h: "Порушення ККТ вимагає негайного блокування продукції." },
            { q: "Алергени: Перехід з Гірчичного на Томатний соус. Дії?", a: ["Злити залишки", "Повна CIP-мийка з контролем", "Промити водою"], ci: 1, h: "Тільки повна мийка гарантує відсутність алергену в новій партії." },
            { q: "Сторонні предмети: дірка в ситі. Що робити з партією?", a: ["Працювати далі", "Ізолювати партію, сито замінити", "Просто замінити сито"], ci: 1, h: "Пошкоджене обладнання — це ризик фізичного забруднення." },
            { q: "Скло: розбилася пляшка. Зона ризику?", a: ["Тільки місце падіння", "Радіус 3-5 метрів, продукт у брак", "Тільки підлога"], ci: 1, h: "Скло розлітається мікроскопічними скалками на значну відстань." },
            { q: "Food Defense: бачите незнайомця без супроводу. Дії?", a: ["Викликати майстра, вивести людину", "Пройти повз", "Привітатися"], ci: 0, h: "Food Defense — це захист від навмисного зараження продукту." },
            { q: "Шахрайство: сировина прийшла без маркування партії. Можна?", a: ["Так", "Ні, використання суворо заборонено", "Якщо майстер дозволить"], ci: 1, h: "Простежуваність — основа харчової безпеки." },
            { q: "Гігієна: чому заборонено лак для нігтів?", a: ["Некрасиво", "Ризик потрапляння лаку в продукт", "Відволікає"], ci: 1, h: "Частки лаку є стороннім фізичним предметом у їжі." },
            { q: "Коли миття рук є обов'язковим?", a: ["Після туалету, відходів, обличчя", "Перед зміною", "Якщо брудні"], ci: 0, h: "Бактерії невидимі, гігієна рук — найкращий захист." },
            { q: "Перехресне забруднення: відро для браку для чистої води?", a: ["Так, помити", "Ні, інвентар тільки за кодуванням", "Один раз"], ci: 1, h: "Кодування за кольорами виключає помилки персоналу." },
            { q: "Здоров'я: діарея без температури. Виходити на зміну?", a: ["Так, ліки", "Ні, повідомити і не контактувати", "Так, мити руки"], ci: 1, h: "Кишкові розлади — джерело небезпечних патогенів." },
            { q: "Ручна мийка: побутові губки або металеві шкребки?", a: ["Так, краще миють", "Ні, категорично заборонено", "Якщо ніхто не бачить"], ci: 1, h: "Губки та метал самі стають джерелом сторонніх предметів." },
            { q: "Ремонт: скотч або дріт на трубі лінії. Можна?", a: ["Так, швидко", "Ні, використання заборонено", "До кінця зміни"], ci: 1, h: "Скотч накопичує бактерії і не є гігієнічним рішенням." },
            { q: "Відходи: як швидко видаляти з зони приготування?", a: ["В кінці тижня", "Регулярно, не допускаючи переповнення", "В кінці зміни"], ci: 1, h: "Відходи приваблюють комах та поширюють бактерії." },
            { q: "FIFO/FEFO: яку палету візьмете першою?", a: ["Ближчу", "З терміном, що закінчується швидше", "Новішу"], ci: 1, h: "FEFO гарантує свіжість сировини." },
            { q: "Хімічна безпека: де зберігати миючі засоби?", a: ["Біля лінії", "У закритій шафі окремо", "Під столом"], ci: 1, h: "Хімія ніколи не повинна потрапити в харчовий ланцюг." },
            { q: "Маркування: який формат етикетки вірний?", a: ["00.00 / 00", "Партія:0000, Дата до: 00.00.0000", "Дата виготовлення"], ci: 1, h: "Чітке маркування дозволяє відстежити кожну партію." },
            { q: "Контроль: надщерблена лопатка. Дії?", a: ["Далі", "Зупинка, ізоляція продукту, майстер", "Знайти шматок"], ci: 1, h: "Навіть малий шматок пластику може травмувати людину." },
            { q: "Вода: звичайна вода для фінального ополіскування?", a: ["Так", "Ні, тільки підготовлена вода ХВО", "Тільки гаряча"], ci: 1, h: "Вода для контакту з продуктом повинна бути бактеріологічно чистою." },
            { q: "Відвідувачі: анкету здоров'я підряднику?", a: ["Ні", "Так, правила для всіх відвідувачів", "Якщо перший раз"], ci: 1, h: "Будь-яка людина в цеху є носієм інфекцій." },
            { q: "Простежуваність: змішувати залишки різних партій спецій?", a: ["Так", "Ні, руйнується простежуваність", "Якщо спеція та сама"], ci: 1, h: "Ви не зможете знайти причину браку, якщо партії змішані." },
            { q: "Re-work: як маркувати соус на переварку?", a: ["Ніяк", "Назва, Дата, 'НА ПЕРЕРОБКУ'", "Завдання"], ci: 1, h: "Контроль переробки критичний для біологічної безпеки." },
            { q: "Прибирання: олія на підлозі. Небезпека HACCP?", a: ["Дорого", "Середовище для Лістерії та бактерій", "Тільки травма"], ci: 1, h: "Жир у вологому середовищі — ідеальний дім для Listeria." },
            { q: "Калібрування: термометр впав. Дії?", a: ["Міряти", "Замінити на повірений, цей на перевірку", "Протерти"], ci: 1, h: "Удар збиває точність, що призведе до недопастеризації." },
            { q: "Шкідники: муха в цеху. Це означає?", a: ["Випадковість", "Порушення герметичності приміщення", "Відкрите вікно"], ci: 1, h: "Муха — джерело патогенних мікробів безпосередньо в продукт." },
            { q: "Стеля лущиться над відкритим котлом. Дії?", a: ["Накрити котел, покликати майстра", "Далі", "Прибрати шматки"], ci: 0, h: "Фарба — це фізичне та хімічне забруднення продукту." }
        ];
        let currentQIndex = 0, score = 0, userName = "", selectedOptionIndex = null, testLog = [], currentOptions = [];
        document.addEventListener('DOMContentLoaded', () => {
            const select = document.getElementById('employeeSelect');
            employeesList.sort().forEach(name => { const opt = document.createElement('option'); opt.value = name; opt.textContent = name; select.appendChild(opt); });
            document.getElementById('q-total-counter').innerText = originalQuestions.length;
            updateNetworkStatus();
            window.addEventListener('online', () => { updateNetworkStatus(); processOfflineQueue(); });
            window.addEventListener('offline', updateNetworkStatus);
        });
        function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
        function startTest() { userName = document.getElementById('employeeSelect').value; if (!userName) { alert("Оберіть ПІБ"); return; } document.getElementById('step-login').classList.add('hidden'); document.getElementById('step-quiz').classList.remove('hidden'); renderQuestion(); }
        function renderQuestion() {
            const q = originalQuestions[currentQIndex];
            document.getElementById('q-current').innerText = currentQIndex + 1;
            document.getElementById('progress-bar').style.width = `${(currentQIndex / originalQuestions.length) * 100}%`;
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('feedback-container').classList.add('hidden');
            const container = document.getElementById('options-container'); container.innerHTML = '';
            const nextBtn = document.getElementById('next-btn'); nextBtn.disabled = true;
            nextBtn.className = "mt-8 w-full bg-gray-300 text-gray-500 font-bold py-4 rounded-xl cursor-not-allowed transition";
            nextBtn.innerText = currentQIndex === originalQuestions.length - 1 ? "Завершити тест" : "Наступне питання";
            currentOptions = q.a.map((text, i) => ({ text, isCorrect: i === q.ci }));
            shuffle(currentOptions);
            currentOptions.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn w-full text-left p-4 rounded-xl text-lg flex items-center mb-2';
                btn.innerHTML = `<span class="w-8 h-8 rounded-full border-2 border-slate-200 flex items-center justify-center mr-3 text-xs font-bold text-slate-400">${String.fromCharCode(65 + i)}</span> ${opt.text}`;
                btn.onclick = () => showFeedback(i, btn);
                container.appendChild(btn);
            });
        }
        function showFeedback(idx, btn) {
            if (selectedOptionIndex !== null) return;
            selectedOptionIndex = idx;
            const isCorrect = currentOptions[idx].isCorrect;
            if (isCorrect) { score++; testLog.push('✅'); btn.classList.add('correct-choice'); } 
            else { testLog.push('❌'); btn.classList.add('wrong-choice'); document.querySelectorAll('.option-btn').forEach((b, i) => { if (currentOptions[i].isCorrect) b.classList.add('correct-choice'); }); }
            document.querySelectorAll('.option-btn').forEach(b => b.classList.add('disabled'));
            const fbox = document.getElementById('feedback-container'), ftype = document.getElementById('feedback-type'), ficon = document.getElementById('feedback-icon'), ftitle = document.getElementById('feedback-title'), ftext = document.getElementById('feedback-text');
            fbox.classList.remove('hidden'); ftext.innerText = originalQuestions[currentQIndex].h;
            if (isCorrect) { ftype.className = "p-4 rounded-xl border-l-4 border-emerald-500 bg-emerald-50 text-emerald-800"; ficon.innerText = "✅"; ftitle.innerText = "Вірно!"; }
            else { ftype.className = "p-4 rounded-xl border-l-4 border-red-500 bg-red-50 text-red-800"; ficon.innerText = "❌"; ftitle.innerText = "Помилка!"; }
            const nextBtn = document.getElementById('next-btn'); nextBtn.disabled = false; nextBtn.className = "mt-8 w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-lg transition";
        }
        function nextQuestion() { selectedOptionIndex = null; currentQIndex++; if (currentQIndex < originalQuestions.length) renderQuestion(); else showResults(); }
        function showResults() {
            document.getElementById('step-quiz').classList.add('hidden'); document.getElementById('step-result').classList.remove('hidden');
            const total = originalQuestions.length;
            const pct = Math.round((score / total) * 100), passed = score >= 24;
            document.getElementById('score-val').innerText = score; document.getElementById('score-total').innerText = total;
            document.getElementById('percentage-val').innerText = `${pct}% Успіху`;
            const icon = document.getElementById('icon-result'), title = document.getElementById('title-result'), msg = document.getElementById('msg-result');
            if (passed) { icon.innerText = "🏆"; title.innerText = "СКЛАДЕНО"; title.className = "text-3xl font-black mb-1 text-emerald-600"; msg.innerText = "Результати збережено в таблицю."; }
            else { icon.innerText = "⚠️"; title.innerText = "НЕ СКЛАДЕНО"; title.className = "text-3xl font-black mb-1 text-red-600"; msg.innerText = `Необхідно 24 бали. У вас ${score}. Пройдіть навчання ще раз.`; }
            const payload = { formType: 'Quality_Passport_Results', name: userName, score, total: total, percent: pct, passed, details: testLog.join(' '), date: new Date().toISOString() };
            sendToGAS(payload);
            const qrText = `FSSC:${userName}|${score}/${total}|${passed?'OK':'FAIL'}|${testLog.join('')}`;
            try { new QRCode(document.getElementById("qrcode"), { text: qrText, width: 140, height: 140, correctLevel : QRCode.CorrectLevel.L }); } catch (e) { console.error(e); }
        }
        function sendToGAS(p) {
            if (!navigator.onLine) { saveToOffline(p); return; }
            fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(p) })
            .then(() => document.getElementById('sync-indicator').innerHTML = '<span class="text-emerald-500 font-bold uppercase tracking-widest text-[10px]">✅ Збережено</span>')
            .catch(() => saveToOffline(p));
        }
        function saveToOffline(p) { const q = JSON.parse(localStorage.getItem(OFFLINE_QUEUE_KEY) || '[]'); q.push(p); localStorage.setItem(OFFLINE_QUEUE_KEY, JSON.stringify(q)); document.getElementById('sync-indicator').innerHTML = '<span class="text-amber-500 font-bold uppercase tracking-widest text-[10px]">📵 Офлайн</span>'; }
        async function processOfflineQueue() {
            if (!navigator.onLine) return; const q = JSON.parse(localStorage.getItem(OFFLINE_QUEUE_KEY) || '[]'); if (q.length === 0) return;
            for (const p of [...q]) { try { await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(p) }); q.shift(); } catch (e) { break; } }
            localStorage.setItem(OFFLINE_QUEUE_KEY, JSON.stringify(q)); updateNetworkStatus();
        }
        function updateNetworkStatus() { const dot = document.getElementById('statusDot'), txt = document.getElementById('statusText'); if (!navigator.onLine) { dot.className = 'w-2 h-2 rounded-full bg-red-500'; txt.textContent = 'Офлайн'; } else { dot.className = 'w-2 h-2 rounded-full bg-green-500'; txt.textContent = 'Онлайн'; } }
    </script>
</body>
</html>
